name: DCLO Weekly Loop — ECO (UPI via data.gov.in)

on:
  schedule:
    - cron: '0 6 * * 5' # Every Friday 06:00 UTC
  workflow_dispatch:

jobs:
  run-eco-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyyaml python-dotenv

      - name: Run ECO ingestion and transform
        env:
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
        run: python scripts/dclo_weekly_loops_agent.py --loop eco

      - name: Run QA checks
        run: python src/quality/run_standard_checks.py --data-dir ./data/gold

      - name: Commit and push ECO outputs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/gold/dclo_eco_upi_monthly.csv \
                  data/gold/dclo_eco_audit_manifest.json \
                  data/gold/dclo_eco_verification.json \
                  data/gold/dclo_standard_checks_summary.json \
                  data/gold/dclo_standard_checks_summary.md \
                  data/raw/upi_datagov_latest.csv || true
          git commit -m "Auto-update DCLO ECO loop (UPI data.gov.in) [skip ci]" || echo "No changes to commit"
          git push

name: DCLO Weekly Loop — SKL (Wikimedia Pageviews)

on:
  schedule:
    - cron: '0 6 * * 2' # Every Tuesday 06:00 UTC
  workflow_dispatch:

jobs:
  run-skl-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyyaml

      - name: Run SKL ingestion and transform
        run: python scripts/dclo_weekly_loops_agent.py --loop skl

      - name: Run QA checks
        run: python src/quality/run_standard_checks.py --data-dir ./data/gold

      - name: Commit and push SKL outputs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/gold/dclo_skl_language_participation_weekly.csv \
                  data/gold/dclo_skl_audit_manifest.json \
                  data/gold/dclo_skl_verification.json \
                  data/gold/dclo_standard_checks_summary.json \
                  data/gold/dclo_standard_checks_summary.md \
                  data/raw/wikimedia_pageviews_latest.csv || true
          git commit -m "Auto-update DCLO SKL loop (Wikimedia pageviews) [skip ci]" || echo "No changes to commit"
          git push

name: DCLO Daily Panel Agent

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC daily
  workflow_dispatch: # Allows manual triggers from GitHub Actions UI

jobs:
  run-longitudinal-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows writing commits back to repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas shapely matplotlib pandas linearmodels

      - name: Run Ingestion Agent
        run: python scripts/dclo_longitudinal_agent.py

      - name: Run Diagnostics & Econometric Panel OLS
        run: python scripts/dclo_panel_diagnostics.py

      - name: Commit and Push Panel Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/gold/dclo_longitudinal.db \
                  data/gold/dclo_longitudinal_audit_manifest.json \
                  data/gold/panel_regression_report.txt \
                  data/gold/panel_event_study.png
          git commit -m "Auto-update DCLO longitudinal panel and diagnostics [skip ci]" || echo "No changes to commit"
          git push

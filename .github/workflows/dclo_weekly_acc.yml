name: DCLO Weekly Loop — ACC (Cloudflare Radar)

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  run-acc-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyyaml

      - name: Run ACC ingestion and transform
        env:
          CLOUDFLARE_RADAR_TOKEN: ${{ secrets.CLOUDFLARE_RADAR_TOKEN }}
        run: python scripts/dclo_weekly_loops_agent.py --loop acc

      - name: Run QA checks
        run: python src/quality/run_standard_checks.py --data-dir ./data/gold

      - name: Commit and push ACC outputs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/gold/dclo_acc_connectivity_weekly.csv \
                  data/gold/dclo_acc_audit_manifest.json \
                  data/gold/dclo_acc_verification.json \
                  data/gold/dclo_standard_checks_summary.json \
                  data/gold/dclo_standard_checks_summary.md \
                  data/raw/cloudflare_radar_latest.csv || true
          git commit -m "Auto-update DCLO ACC loop (Cloudflare Radar) [skip ci]" || echo "No changes to commit"
          git push

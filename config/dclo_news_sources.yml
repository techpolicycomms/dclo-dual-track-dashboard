# Google News RSS fills gaps for regional-language digital/tech coverage per country.
google_news_searches:
  - id: gn_india_hi
    publisher_name: Google News India (Hindi)
    country_iso3: IND
    language: hi
    hl: hi
    gl: IN
    ceid: IN:hi
    query: "डिजिटल OR तकनीक OR इंटरनेट OR साइबर"

  - id: gn_india_ta
    publisher_name: Google News India (Tamil)
    country_iso3: IND
    language: ta
    hl: ta
    gl: IN
    ceid: IN:ta
    query: "டிஜிட்டல் OR தொழில்நுட்பம் OR இணையம்"

  - id: gn_mexico_es
    publisher_name: Google News Mexico (Spanish)
    country_iso3: MEX
    language: es
    hl: es-419
    gl: MX
    ceid: MX:es-419
    query: "tecnología digital OR internet OR ciberseguridad"

  - id: gn_brazil_pt
    publisher_name: Google News Brazil (Portuguese)
    country_iso3: BRA
    language: pt
    hl: pt-BR
    gl: BR
    ceid: BR:pt-419
    query: "tecnologia digital OR internet OR inclusão digital"

  - id: gn_france_fr
    publisher_name: Google News France (French)
    country_iso3: FRA
    language: fr
    hl: fr
    gl: FR
    ceid: FR:fr
    query: "numérique OR technologie OR internet OR cybersécurité"

  - id: gn_germany_de
    publisher_name: Google News Germany (German)
    country_iso3: DEU
    language: de
    hl: de
    gl: DE
    ceid: DE:de
    query: "Digitalisierung OR Technologie OR Internet OR Cybersicherheit"

  - id: gn_japan_ja
    publisher_name: Google News Japan (Japanese)
    country_iso3: JPN
    language: ja
    hl: ja
    gl: JP
    ceid: JP:ja
    query: "デジタル OR 技術 OR インターネット OR サイバー"

  - id: gn_korea_ko
    publisher_name: Google News Korea (Korean)
    country_iso3: KOR
    language: ko
    hl: ko
    gl: KR
    ceid: KR:ko
    query: "디지털 OR 기술 OR 인터넷 OR 사이버"

  - id: gn_china_zh
    publisher_name: Google News China (Chinese)
    country_iso3: CHN
    language: zh
    hl: zh-CN
    gl: CN
    ceid: CN:zh-Hans
    query: "数字 OR 技术 OR 互联网 OR 网络"

  - id: gn_uae_ar
    publisher_name: Google News UAE (Arabic)
    country_iso3: ARE
    language: ar
    hl: ar
    gl: AE
    ceid: AE:ar
    query: "تقنية OR رقمي OR إنترنت OR سيبراني"

  - id: gn_saudi_ar
    publisher_name: Google News Saudi Arabia (Arabic)
    country_iso3: SAU
    language: ar
    hl: ar
    gl: SA
    ceid: SA:ar
    query: "تقنية OR رقمي OR إنترنت OR ذكاء اصطناعي"

  - id: gn_nigeria_en
    publisher_name: Google News Nigeria (English)
    country_iso3: NGA
    language: en
    hl: en-NG
    gl: NG
    ceid: NG:en
    query: "digital technology OR fintech OR broadband OR startup"

  - id: gn_kenya_en
    publisher_name: Google News Kenya (English)
    country_iso3: KEN
    language: en
    hl: en-KE
    gl: KE
    ceid: KE:en
    query: "digital technology OR mobile money OR internet"

  - id: gn_indonesia_id
    publisher_name: Google News Indonesia (Indonesian)
    country_iso3: IDN
    language: id
    hl: id
    gl: ID
    ceid: ID:id
    query: "teknologi digital OR internet OR fintech"

  - id: gn_australia_en
    publisher_name: Google News Australia (English)
    country_iso3: AUS
    language: en
    hl: en-AU
    gl: AU
    ceid: AU:en
    query: "digital technology OR cybersecurity OR broadband"

  - id: gn_canada_en
    publisher_name: Google News Canada (English)
    country_iso3: CAN
    language: en
    hl: en-CA
    gl: CA
    ceid: CA:en
    query: "digital technology OR AI OR privacy OR connectivity"

  - id: gn_uk_en
    publisher_name: Google News UK (English)
    country_iso3: GBR
    language: en
    hl: en-GB
    gl: GB
    ceid: GB:en
    query: "digital technology OR govtech OR broadband OR cyber"


output:
  data_dir: ./data
  raw_subdir: raw/news
  gold_intake_file: dclo_news_intake.csv
  gold_domain_summary_file: dclo_news_domain_summary.json
  gold_country_summary_file: dclo_news_country_summary.csv
  sync_state_file: dclo_news_sync_state.json

fetch:
  timeout_seconds: 25
  max_articles_per_feed: 30
  user_agent: "DCLO-News-Agent/1.0 (research pipeline)"
  lookback_days: 14

# Top digital / tech publishers by country with RSS where available.
# Extend this list to add more countries or regional-language outlets.
publishers:
  # --- Global / multiregional ---
  - id: bbc_technology
    name: BBC Technology
    country_iso3: GBR
    language: en
    tier: global
    rss_url: https://feeds.bbci.co.uk/news/technology/rss.xml

  - id: techcrunch
    name: TechCrunch
    country_iso3: USA
    language: en
    tier: global
    rss_url: https://techcrunch.com/feed/

  - id: the_verge
    name: The Verge
    country_iso3: USA
    language: en
    tier: global
